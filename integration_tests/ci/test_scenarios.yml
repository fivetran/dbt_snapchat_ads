schema_variable_name: "snapchat_ads_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "region and country reports"
    vars:
      ad_reporting__url_report__using_null_filter: false
      snapchat_ads__using_campaign_region_report: true
      snapchat_ads__using_campaign_country_report: true
    include_incremental: false